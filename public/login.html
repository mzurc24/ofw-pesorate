<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | OFW PesoRate Admin</title>
    <meta name="description" content="Secure admin access for OFW PesoRate platform">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-end: #6366f1;
            --border: #e2e8f0;
            --input-bg: rgba(255,255,255,0.85);
            --card-bg: rgba(255,255,255,0.72);
            --shadow: 0 12px 48px rgba(15,23,42,0.10), 0 2px 8px rgba(15,23,42,0.06);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 50%, #f1f5f9 100%);
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Blobs ── */
        .blobs {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: floatBlob 14s ease-in-out infinite;
        }
        .blob-1 {
            width: 520px; height: 520px;
            top: -120px; left: -140px;
            background: radial-gradient(circle, #bfdbfe 0%, #dbeafe 70%, transparent 100%);
            opacity: 0.55;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 420px; height: 420px;
            bottom: -100px; right: -120px;
            background: radial-gradient(circle, #ede9fe 0%, #f5f3ff 70%, transparent 100%);
            opacity: 0.50;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            top: 45%; left: 55%;
            background: radial-gradient(circle, #fce7f3 0%, #fdf2f8 70%, transparent 100%);
            opacity: 0.45;
            animation-delay: -9s;
        }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33%       { transform: translate(25px,-18px) scale(1.04); }
            66%       { transform: translate(-20px, 14px) scale(0.97); }
        }

        /* ── Grid Texture ── */
        .grid-texture {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(148,163,184,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── Card ── */
        .card-wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            padding: 24px;
            animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 20px;
            padding: 44px 40px 40px;
            box-shadow: var(--shadow);
        }

        /* ── Logo ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-end));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }
        .logo-text {
            display: flex; flex-direction: column; line-height: 1.1;
        }
        .logo-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .logo-badge {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── Headings ── */
        .card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            background: none;
            -webkit-text-fill-color: var(--text-primary);
        }
        .card .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.1px;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-muted);
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            background: rgba(255,255,255,0.95);
        }

        /* Password wrapper */
        .pw-wrapper {
            position: relative;
        }
        .pw-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 14px; padding: 2px;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text-secondary); }

        /* ── Button ── */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.1px;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.28);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover {
            opacity: 0.92;
            box-shadow: 0 6px 28px rgba(99,102,241,0.38);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.65; cursor: not-allowed; transform: none;
        }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error message ── */
        .error-msg {
            display: none;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 9px;
            padding: 11px 14px;
            font-size: 0.85rem;
            color: #dc2626;
            margin-top: 14px;
            text-align: center;
            animation: shake 0.45s ease both;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            60%      { transform: translateX(6px); }
        }

        /* ── Secure badge ── */
        .secure-badge {
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            margin-top: 22px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .secure-badge svg { opacity: 0.5; }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; }
            .card-wrapper { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="grid-texture"></div>

    <div class="card-wrapper">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">₱</div>
                <div class="logo-text">
                    <span class="logo-name">OFW PesoRate</span>
                    <span class="logo-badge">Admin Portal</span>
                </div>
            </div>

            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to access the admin dashboard.</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email-input">Email address</label>
                    <input
                        type="email"
                        id="email-input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        autofocus
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="password-input">Access Token</label>
                    <div class="pw-wrapper">
                        <input
                            type="password"
                            id="password-input"
                            placeholder="Enter your token"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
                            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="signin-btn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btn-label">Sign In</span>
                </button>

                <div class="error-msg" id="error-msg">
                    ✕ &nbsp;Invalid credentials. Please try again.
                </div>
            </form>

            <div class="secure-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Secured • OFW PesoRate Admin
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email-input');
        const passInput = document.getElementById('password-input');
        const signinBtn = document.getElementById('signin-btn');
        const btnLabel = document.getElementById('btn-label');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('error-msg');
        const pwToggle = document.getElementById('pw-toggle');

        // Password visibility toggle
        pwToggle.addEventListener('click', () => {
            const isText = passInput.type === 'text';
            passInput.type = isText ? 'password' : 'text';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = passInput.value.trim();
            if (!token) return;

            // Loading state
            signinBtn.disabled = true;
            spinner.style.display = 'block';
            btnLabel.textContent = 'Signing in...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin/metrics', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    // Store token and redirect
                    sessionStorage.setItem('admin_token', token);
                    btnLabel.textContent = 'Redirecting...';
                    window.location.href = '/admin.html?token=' + encodeURIComponent(token);
                } else {
                    throw new Error('Invalid');
                }
            } catch {
                errorMsg.style.display = 'block';
                // Reset animation
                errorMsg.style.animation = 'none';
                errorMsg.offsetHeight; // reflow
                errorMsg.style.animation = 'shake 0.45s ease both';
            } finally {
                signinBtn.disabled = false;
                spinner.style.display = 'none';
                btnLabel.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
