<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Cost Currency Platform</title>
    <meta name="description" content="Automatic, fast, and responsive currency conversion to PHP">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <div class="glass-panel" id="main-panel">
            <!-- First Visit Prompt -->
            <div id="first-visit" class="hidden">
                <h1>Welcome to Pesorate</h1>
                <p>What should we call you?</p>
                <div class="input-group">
                    <input type="text" id="name-input" placeholder="Your name" autocomplete="off">
                    <button class="btn" id="save-name-btn">Continue</button>
                </div>
            </div>

            <!-- Conversion Dashboard -->
            <div id="dashboard" class="hidden fade-in">
                <h1 id="greeting">Hello</h1>
                <p class="subtitle">Here's your real-time rate today</p>
                
                <div class="rate-card">
                    <div class="selector-group">
                        <select id="currency-select" class="currency-select">
                            <option value="PHP">₱ PHP (Philippine Peso)</option>
                            <option value="SAR">﷼ SAR (Saudi Arabia)</option>
                            <option value="AED">د.إ AED (United Arab Emirates)</option>
                            <option value="QAR">﷼ QAR (Qatar)</option>
                            <option value="KWD">د.ك KWD (Kuwait)</option>
                            <option value="OMR">﷼ OMR (Oman)</option>
                            <option value="BHD">.د.ب BHD (Bahrain)</option>
                            <option value="GBP">£ GBP (United Kingdom)</option>
                            <option value="EUR">€ EUR (Euro Zone)</option>
                            <option value="CHF">CHF (Switzerland)</option>
                            <option value="NOK">kr NOK (Norway)</option>
                            <option value="SEK">kr SEK (Sweden)</option>
                            <option value="SGD">$ SGD (Singapore)</option>
                            <option value="HKD">$ HKD (Hong Kong)</option>
                            <option value="MYR">RM MYR (Malaysia)</option>
                            <option value="TWD">NT$ TWD (Taiwan)</option>
                            <option value="JPY">¥ JPY (Japan)</option>
                            <option value="KRW">₩ KRW (South Korea)</option>
                            <option value="CNY">¥ CNY (China)</option>
                            <option value="THB">฿ THB (Thailand)</option>
                            <option value="USD">$ USD (United States)</option>
                            <option value="CAD">$ CAD (Canada)</option>
                            <option value="MXN">$ MXN (Mexico)</option>
                            <option value="AUD">$ AUD (Australia)</option>
                            <option value="NZD">$ NZD (New Zealand)</option>
                        </select>
                    </div>
                    <div class="currency-pair" id="currency-pair">1 --- &rarr; 1 PHP</div>
                    <div class="rate-value-container">
                        <span class="symbol" id="target-symbol">₱</span>
                        <span class="rate-value" id="rate-value">0.00</span>
                    </div>
                </div>
                
                <div class="action-footer">
                    <p class="last-updated" id="last-updated">Updating live...</p>
                    <button class="btn btn-secondary" id="refresh-btn">Refresh</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
