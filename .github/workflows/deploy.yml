name: Deploy & Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-safeguard:
    runs-on: ubuntu-latest
    name: Build, E2E Test, and Promote
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: 🚀 Deploy to Cloudflare Preview
        id: deploy_preview
        run: |
          # Deploying without an explicit production branch targets a preview environment
          OUTPUT=$(npx wrangler pages deploy public --project-name=ofw-pesorate)
          echo "$OUTPUT"
          
          # Extract the deployment URL for testing
          PREVIEW_URL=$(echo "$OUTPUT" | grep -o 'https://[^"]*\.ofw-pesorate\.pages\.dev')
          echo "TEST_URL=$PREVIEW_URL" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🧪 Run Global Health Checks on Preview
        run: node scripts/health_check.js
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}

      - name: 🚚 Promote to Production
        if: success()
        run: npx wrangler pages deploy public --project-name=ofw-pesorate --branch=production --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🧹 Purge Cloudflare Edge Cache
        if: success()
        run: node scripts/purge_cache.js
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          
      - name: 🚨 Alert on Deployment Failure
        if: failure()
        run: |
          echo "Deployment tests failed. Production remains untouched."
          # Optionally add curl here to hit a Slack Webhook using secrets.SLACK_WEBHOOK_URL
