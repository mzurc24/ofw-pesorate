name: Advanced DevOps AI Monitoring (Hourly)

on:
  schedule:
    - cron: '0 * * * *' # Top of every hour
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  devops_monitor:
    runs-on: ubuntu-latest
    name: System Health & Maintenance Engine
    
    steps:
      - name: "🚀 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🛠️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "🔍 DevOps System Scan (Zero Credit)"
        id: scan
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          node scripts/devops_check.js
        continue-on-error: false

      - name: "🔄 Maintenance: Scheduled Rate Sync (Budget-Safe)"
        if: steps.scan.outputs.allow_maintenance == 'true'
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          echo "🔄 System Healthy. Checking if Twelve Data sync is due..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CF_ADMIN_TOKEN" \
            "https://ofwpesorate.madzlab.site/api/admin/sync")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Sync successful or throttle active."
          elif [ "$HTTP_CODE" = "429" ]; then
            echo "⚠️  Budget protection triggered. OK."
          else
            echo "❌ Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: "📸 Maintenance: Daily Snapshot Seeding"
        if: steps.scan.outputs.allow_maintenance == 'true'
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          echo "📸 System Healthy. Triggering Daily snapshot..."
          curl -s -X POST \
            -H "Authorization: Bearer $CF_ADMIN_TOKEN" \
            "https://ofwpesorate.madzlab.site/api/admin/snapshot"

      - name: "🧹 Maintenance: Automated Log Rotation & Cleanup"
        if: steps.scan.outputs.allow_maintenance == 'true'
        env:
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}
        run: |
          echo "🧹 System Healthy. Cleaning old telemetry logs..."
          curl -s -X POST \
            -H "Authorization: Bearer $CF_ADMIN_TOKEN" \
            "https://ofwpesorate.madzlab.site/api/admin/cleanup"

      - name: "🚨 Alert on Critical Scan Failure"
        if: failure()
        run: |
          echo "🚨 DevOps Engine detected a CRITICAL issue."
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"⛔ **CRITICAL: OFW DevOps AI Check FAILED** or System is DOWN. Maintenance Locked.\"}" \
                 "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi
