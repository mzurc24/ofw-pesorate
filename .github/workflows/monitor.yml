name: Global Monitor & Self-Heal

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: Production Health Monitor
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: 🧪 Run Global Tests Against Production
        id: health_test
        run: node scripts/health_check.js
        env:
          TEST_URL: 'https://ofwpesorate.madzlab.site/'
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}

      - name: '🩹 Self-Healing (Tier 1): Purge Cache on Failure'
        if: failure()
        run: |
          echo "Health check failed! Attempting cache purge..."
          node scripts/purge_cache.js
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🧪 Re-Test After Purge
        if: failure()
        run: |
          echo "Waiting 10s for Cache Purge to propagate..."
          sleep 10
          node scripts/health_check.js
        env:
          TEST_URL: 'https://ofwpesorate.madzlab.site/'
          CF_ADMIN_TOKEN: ${{ secrets.CF_ADMIN_TOKEN }}

      - name: 🚨 Critical Alert (Tier 2 Failure)
        if: failure()
        run: |
          echo "Production is STILL failing after Cache Purge."
          echo "Check the GitHub Actions logs immediately."
          # Optional: Add curl to trigger an incident response webhook (e.g., Slack)
