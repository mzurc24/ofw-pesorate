name: Daily Rate Sync (Self-Healing Cron)

on:
  schedule:
    # Run every 6 hours — Fixer free plan allows ~1000 calls/month
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Auto-Sync Fixer Rates
    steps:
      - name: Trigger Rate Sync
        run: |
          echo "🔄 Triggering rate sync at $(date -u)"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://ofw-pesorate.pages.dev/api/admin/sync?token=${{ secrets.CF_ADMIN_TOKEN }}&force=true")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Sync successful"
          elif [ "$HTTP_CODE" = "429" ]; then
            echo "⏭️ Rates already fresh (throttled) — OK"
          else
            echo "❌ Sync failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Health Check
        run: |
          echo "🏥 Running health check..."
          curl -s https://ofw-pesorate.pages.dev/api/health | python3 -m json.tool || echo "Health endpoint check completed"

      - name: Verify Rates Available
        run: |
          echo "📊 Verifying rates endpoint..."
          RESPONSE=$(curl -s https://ofw-pesorate.pages.dev/api/rate)
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"
          
          # Check if response contains a valid rate
          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('rate',0) > 0" 2>/dev/null; then
            echo "✅ Rates verified — system healthy"
          else
            echo "⚠️ Rate verification needs attention"
          fi
