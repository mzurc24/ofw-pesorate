name: Daily Rate Sync & Snapshot (Quota-Safe)

on:
  schedule:
    # Run once per day at 00:05 UTC — max 31 Fixer.io calls/month (well within 100-call free tier)
    - cron: '5 0 * * *'
  # workflow_dispatch is intentionally NOT included — all triggers must be scheduled only

jobs:
  daily_sync_and_snapshot:
    runs-on: ubuntu-latest
    name: Daily Fixer Sync + Trend Snapshot

    steps:
      - name: 📊 Check Fixer.io Quota Before Sync
        id: quota_check
        run: |
          echo "📊 Checking monthly Fixer.io API quota..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/system")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ System endpoint unreachable (HTTP $HTTP_CODE) — aborting to protect quota"
            exit 1
          fi

          echo "✅ System reachable. Proceeding with sync."

      - name: 🔄 Trigger Daily Rate Sync (Quota-Safe, Throttle-Respected)
        id: fixer_sync
        run: |
          echo "🔄 Triggering daily Fixer.io rate sync at $(date -u)"

          # NOTE: No ?force=true — sync.js internal throttle (6h) protects against double-calls.
          # If already synced recently, this returns HEALTHY/CACHE without hitting Fixer.
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/sync")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Sync HTTP Status: $HTTP_CODE"
          echo "Sync Response: $JSON_BODY"

          # 429 means quota protected — still a safe outcome, not a failure
          if [ "$HTTP_CODE" = "429" ]; then
            echo "⚠️  Monthly Fixer quota guard triggered — no call made. System is safe."
            exit 0
          fi

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "503" ]; then
            echo "❌ Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Rate sync completed."

      - name: 📸 Auto-Save Daily Trend Snapshot
        run: |
          echo "📸 Saving daily currency trend snapshot at $(date -u)"

          # Snapshot reads from D1 rates_cache only — ZERO Fixer.io calls.
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/snapshot")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Snapshot HTTP Status: $HTTP_CODE"
          echo "Snapshot Response: $JSON_BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Trend snapshot saved. Currency chart will show today's data point."
          else
            echo "⚠️  Snapshot save returned HTTP $HTTP_CODE (non-fatal — D1 may be temporarily busy)"
          fi

      - name: 🏥 Final Health Verification
        run: |
          echo "🏥 Verifying system health post-sync..."

          RESPONSE=$(curl -s -w "\n%{http_code}" "https://ofwpesorate.madzlab.site/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
            echo "✅ System healthy."
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE"
          fi

      - name: 🚨 Alert on Critical Failure
        if: failure()
        run: |
          echo "🚨 Daily sync or snapshot failed. Check logs above."
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"🚨 **OFW PesoRate Daily Sync FAILED** at $(date -u). Check GitHub Actions logs.\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
