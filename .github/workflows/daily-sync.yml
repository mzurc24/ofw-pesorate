name: Automated Rate Sync & Snapshot (Twelve Data)

on:
  schedule:
    # Every 2 hours at :05 — 12 syncs/day × 24 credits = 288 credits/day (36% of 800 free-tier limit)
    - cron: '5 */2 * * *'
  workflow_dispatch: # Allow manual trigger to fix stale sync states

jobs:
  rate_sync_and_snapshot:
    runs-on: ubuntu-latest
    name: Rate Sync + Trend Snapshot

    steps:
      - name: 📊 Check Daily Credit Budget Before Sync
        id: budget_check
        run: |
          echo "📊 Verifying system is online and within budget..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/system")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ System unreachable (HTTP $HTTP_CODE) — aborting to protect API budget."
            exit 1
          fi

          echo "✅ System online. Proceeding."

      - name: 🔄 Sync Rates from Twelve Data (Budget-Safe)
        id: rate_sync
        run: |
          echo "🔄 Triggering Twelve Data rate sync at $(date -u)"
          echo "   Budget: 800 credits/day | This call: 24 credits | Schedule: 12×/day = 288 credits/day"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/sync")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Sync HTTP Status: $HTTP_CODE"
          echo "Sync Response: $JSON_BODY"

          # 429 = daily quota guard triggered (safe — no call was made to Twelve Data)
          if [ "$HTTP_CODE" = "429" ]; then
            echo "⚠️  Daily quota guard triggered — skipping sync to protect budget. OK."
            exit 0
          fi

          # 503 = circuit breaker active (safe — Twelve Data had repeated failures)
          if [ "$HTTP_CODE" = "503" ]; then
            echo "⚠️  Circuit breaker active — Twelve Data temporarily disabled. OK."
            exit 0
          fi

          # 200 with CACHE status = data was fresh, sync skipped by 2h throttle
          SYNC_STATUS=$(echo "$JSON_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data_source',''))" 2>/dev/null || echo "")
          if [ "$SYNC_STATUS" = "CACHE" ]; then
            echo "✅ Data is fresh — sync skipped by throttle (within 2h window). OK."
            exit 0
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Extract and log credit usage for monitoring
          CREDITS_TODAY=$(echo "$JSON_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('credits_used_today','?'))" 2>/dev/null || echo "?")
          CREDITS_LEFT=$(echo "$JSON_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('credits_remaining_today','?'))" 2>/dev/null || echo "?")
          echo "✅ Sync complete. Credits used today: ${CREDITS_TODAY}/700 | Remaining: ${CREDITS_LEFT}"

      - name: 📸 Save Daily Trend Snapshot (D1-only, Zero API Credits)
        run: |
          echo "📸 Saving currency trend snapshot at $(date -u)"
          echo "   NOTE: Snapshot reads from D1 rates_cache — ZERO Twelve Data credits consumed."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_ADMIN_TOKEN }}" \
            "https://ofwpesorate.madzlab.site/api/admin/snapshot")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Snapshot HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            SNAP_DATE=$(echo "$JSON_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('date','?'))" 2>/dev/null || echo "?")
            echo "✅ Trend snapshot saved for ${SNAP_DATE}. Admin chart will display this data point."
          else
            echo "⚠️  Snapshot returned HTTP $HTTP_CODE (non-fatal — D1 may have been temporarily busy)."
          fi

      - name: 🏥 Final Health Check
        run: |
          echo "🏥 Verifying live API response..."

          RESPONSE=$(curl -s -w "\n%{http_code}" "https://ofwpesorate.madzlab.site/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
            echo "✅ Platform is healthy."
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE — may need investigation."
          fi

      - name: 🚨 Alert on Critical Failure
        if: failure()
        run: |
          echo "🚨 Automated sync pipeline FAILED. Review logs above."
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"🚨 **OFW PesoRate Sync FAILED** at $(date -u). Source: Twelve Data. Check GitHub Actions.\"}" \
                 "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi
